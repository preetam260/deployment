<h2> Weather </h2>

<button (click)="loadWeather()">Get Weather</button>
<p *ngIf = "isLoading">Loading...</p>
<p *ngIf = "errorMessage"> {{errorMessage}} </p>

<h3>Total Forecast Records: {{ weatherData.length }}</h3>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Temperature (C)</th>
      <th>Temperature (F)</th>
      <th>Summary</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let weather of weatherData" [ngClass]="{hot: weather.temperatureC > 30, cold: weather.temperatureC < 10}">

      <td>{{ weather.date }}</td>
      <td>{{ weather.temperatureC }}</td>
      <td>{{ weather.temperatureF }}</td>
      <td>{{ weather.summary }}</td>

    </tr>

  </tbody>

</table>
